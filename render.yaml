services:
  - type: web
    name: serveiq-backend
    env: node
    plan: starter
    buildCommand: cd apps/api && npm install && npm run build
    startCommand: cd apps/api && npm run migration:run && npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: serveiq-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: serveiq-redis
          type: redis
          property: connectionString

databases:
  - name: serveiq-db
    databaseName: serveiq
    user: serveiq
    plan: starter
